name: Purge jsDelivr Cache

on:
  push:
    branches: [main]

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge cached files from jsDelivr
        run: |
          FILES=(
            "index.html"
            "styles.css"
            "config.js"
            "app.js"
            "deliverables.js"
            "sheets-api.js"
            "deliverables_data.json"
            "logo.png"
          )
          for file in "${FILES[@]}"; do
            echo "Purging $file..."
            curl -s "https://purge.jsdelivr.net/gh/dyoma-web/drj@main/$file"
            echo ""
          done
          echo "Purge complete."
